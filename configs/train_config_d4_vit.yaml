training:
  start_epoch: 0
  resume: false
  num_epochs: 50
  batch_size: 8
  device: "cuda"
  checkpoint_interval: 1
  checkpoint_dir: "outputs/checkpoints/d4_vit"
  val_size: 0.1
  random_seed: 42

data:
  tensorboard_logdir: "outputs/tensorboard/d4_vit"
  num_workers: 4
  negative_probability: 0.5
  target_mode: "completion"

model:
  model_name: "itp_d4_vit"
  initialization_weights_path: null
  encoder:
    type: "vit_encoder"
    freeze_image_encoder: false
    out_token_n_embd: 512
  decoder:
    pos_encoding: "learned"
    rope_base: null
    activation: "gelu"
    n_embd: 512
    ffn_ratio: 4
    n_head: 8
    n_layer: 3
    max_seq_len: 6
    dropout: 0.1
    bias: false
    bos_token_id: 1
    eos_token_id: 2
    pad_token_id: 0
    null_token_id: 6
    vocab_size: 7

optimizer:
  name: "AdamW"
  lr: 0.0001
  weight_decay: 0.01
  betas: [0.9, 0.999]

scheduler:
  milestones: [20, 40]
  gamma: 0.5
